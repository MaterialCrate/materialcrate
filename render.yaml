databases:
  - name: materialcrate-db
    plan: basic-256mb

services:
  - type: web
    name: materialcrate-api
    runtime: node
    rootDir: server
    plan: starter
    autoDeploy: true
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm render:build
    preDeployCommand: pnpm render:migrate
    startCommand: pnpm start
    healthCheckPath: /.well-known/apollo/server-health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: materialcrate-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GRAPHQL_BODY_LIMIT
        value: 35mb
      - key: PADDLE_API_KEY
        sync: false
      - key: PADDLE_WEBHOOK_SECRET
        sync: false
      - key: PADDLE_PRO_PRICE_ID
        sync: false
      - key: PADDLE_PREMIUM_PRICE_ID
        sync: false
      - key: PADDLE_DEFAULT_CURRENCY
        value: USD
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_BUCKET_NAME
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: SES_USER
        sync: false
      - key: SES_PASS
        sync: false
      - key: SUPPORT_EMAIL
        value: support@materialcrate.com

  - type: web
    name: materialcrate-web
    runtime: node
    rootDir: web
    plan: starter
    autoDeploy: true
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm render:build
    startCommand: pnpm start
    healthCheckPath: /launch
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: GRAPHQL_ENDPOINT
        value: https://materialcrate-api.onrender.com/graphql
      - key: APP_BASE_URL
        value: https://www.materialcrate.com
      - key: NEXT_PUBLIC_PADDLE_ENVIRONMENT
        value: production
      - key: NEXT_PUBLIC_PADDLE_CLIENT_TOKEN
        sync: false
      - key: NEXT_PUBLIC_PADDLE_PRO_PRICE_ID
        sync: false
      - key: NEXT_PUBLIC_PADDLE_PREMIUM_PRICE_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: NEXT_PUBLIC_LAUNCH_AT
        value: 2026-04-06T20:00:00
      - key: LAUNCH_AT
        value: 2026-04-06T20:00:00
      - key: LAUNCH_PROTECTED_HOSTS
        value: materialcrate.com,www.materialcrate.com,materialcrate-web.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
