type DocumentRequest {
  id: ID!
  title: String!
  description: String!
  categories: [String!]!
  bounty: Int
  bountyEscrowedAt: String
  bountyReleasedAt: String
  acceptedFulfillmentId: ID
  solved: Boolean!
  closed: Boolean!
  deleted: Boolean!
  deletedAt: String
  responseCount: Int!
  canEditBounty: Boolean!
  author: User!
  fulfillments: [DocumentRequestFulfillment!]!
  acceptedFulfillment: DocumentRequestFulfillment
  viewerHasFulfilled: Boolean!
  viewerIsAuthor: Boolean!
  createdAt: String!
  updatedAt: String!
}

type DocumentRequestFulfillment {
  id: ID!
  requestId: ID!
  postId: ID!
  authorId: ID!
  likeCount: Int!
  viewerHasLiked: Boolean!
  isAccepted: Boolean!
  author: User!
  post: Post!
  createdAt: String!
}

type DocumentRequestFeed {
  requests: [DocumentRequest!]!
  hasMore: Boolean!
  total: Int!
}

extend type Query {
  documentRequest(id: ID!): DocumentRequest
  documentRequests(
    filter: String
    feed: Boolean
    limit: Int
    offset: Int
  ): DocumentRequestFeed!
  recentlyDeletedRequests(limit: Int, offset: Int): [DocumentRequest!]!
}

extend type Mutation {
  createDocumentRequest(
    title: String!
    description: String!
    categories: [String!]!
    bounty: Int
  ): DocumentRequest!

  fulfillDocumentRequest(
    requestId: ID!
    postId: ID!
  ): DocumentRequestFulfillment!

  acceptFulfillment(
    fulfillmentId: ID!
  ): DocumentRequest!

  toggleFulfillmentLike(
    fulfillmentId: ID!
  ): DocumentRequestFulfillment!

  closeDocumentRequest(
    id: ID!
  ): DocumentRequest!

  updateDocumentRequest(
    id: ID!
    title: String
    description: String
    categories: [String!]
    bounty: Int
  ): DocumentRequest!

  restoreDocumentRequest(id: ID!): DocumentRequest!
  permanentlyDeleteDocumentRequest(id: ID!): Boolean!
  deleteDocumentRequest(id: ID!): Boolean!
  deleteDocumentRequestFulfillment(fulfillmentId: ID!): Boolean!
}
