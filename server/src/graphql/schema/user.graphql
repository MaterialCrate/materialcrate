type User {
  id: ID!
  username: String!
  displayName: String!
  profilePicture: String
  profileBackground: String!
  theme: String!
  visibilityPublicProfile: Boolean!
  visibilityPublicPosts: Boolean!
  visibilityPublicComments: Boolean!
  visibilityOnlineStatus: Boolean!
  emailNotificationsAccountActivity: Boolean!
  emailNotificationsWeeklySummary: Boolean!
  emailNotificationsProductUpdates: Boolean!
  emailNotificationsMarketing: Boolean!
  pushNotificationsLikes: Boolean!
  pushNotificationsComments: Boolean!
  pushNotificationsFollows: Boolean!
  pushNotificationsMentions: Boolean!
  followers: [User!]!
  following: [User!]!
  mutedUsers: [User!]!
  blockedUsers: [User!]!
  followersCount: Int!
  followingCount: Int!
  email: String!
  pendingEmail: String
  linkedSEOs: [String!]!
  uninterestedPostIds: [ID!]!
  blockedUserIds: [ID!]!
  subscriptionPlan: String!
  subscriptionStartedAt: String
  subscriptionEndsAt: String
  pendingSubscriptionPlan: String
  pendingSubscriptionAction: String
  pendingSubscriptionEffectiveAt: String
  emailVerified: Boolean!
  deleted: Boolean!
  deletedAt: String
  disabled: Boolean!
  disabledAt: String
  disabledUntil: String
  institution: String
  program: String
  createdAt: String
}

type AuthPayload {
  token: String!
  user: User!
  verificationEmailSent: Boolean!
  verificationEmailError: String
  restoreRequired: Boolean!
  restoreDeadline: String
}

type FollowResult {
  followed: Boolean!
  pending: Boolean!
}

type Query {
  me: User
  user(id: ID!): User
  userByUsername(username: String!): User
  searchUsers(query: String!, limit: Int = 12): [User!]!
  usernameAvailable(username: String!): Boolean!
  emailAvailable(email: String!): Boolean!
  pendingFollowRequestId(username: String!): ID
  pendingFollowRequestForActor(actorId: ID!): ID
}

type Mutation {
  signup(
    email: String!
    password: String!
    username: String!
    displayName: String!
    institution: String
    program: String
  ): AuthPayload
  login(email: String!, password: String!): AuthPayload
  socialAuth(
    provider: String!
    providerUserId: String!
    email: String!
    displayName: String
  ): AuthPayload
  verifyEmailCode(email: String!, code: String!): Boolean!
  resendVerificationEmail(email: String!): Boolean!
  requestEmailChange(newEmail: String!): Boolean!
  changePassword(currentPassword: String, newPassword: String!): Boolean!
  verifyPendingEmailChange(code: String!): User!
  resendPendingEmailChange: Boolean!
  deleteMyAccount: Boolean!
  restoreDeletedAccount: User!
  disableMyAccount(until: String): Boolean!
  reactivateMyAccount: Boolean!
  updateVisibilitySettings(
    visibilityPublicProfile: Boolean!
    visibilityPublicPosts: Boolean!
    visibilityPublicComments: Boolean!
    visibilityOnlineStatus: Boolean!
  ): User!
  updateEmailNotificationSettings(
    emailNotificationsAccountActivity: Boolean!
    emailNotificationsWeeklySummary: Boolean!
    emailNotificationsProductUpdates: Boolean!
    emailNotificationsMarketing: Boolean!
  ): User!
  updatePushNotificationSettings(
    pushNotificationsLikes: Boolean!
    pushNotificationsComments: Boolean!
    pushNotificationsFollows: Boolean!
    pushNotificationsMentions: Boolean!
  ): User!
  updateTheme(theme: String!): User!
  followUser(username: String!): FollowResult!
  unfollowUser(username: String!): Boolean!
  acceptFollowRequest(requestId: ID!): Boolean!
  declineFollowRequest(requestId: ID!): Boolean!
  cancelFollowRequest(username: String!): Boolean!
  muteUser(username: String!): Boolean!
  unmuteUser(username: String!): Boolean!
  blockUser(username: String!): Boolean!
  unblockUser(username: String!): Boolean!
  completeProfile(
    username: String!
    displayName: String!
    institution: String!
    program: String
    profilePicture: String
    profileBackground: String
    profileBackgroundFileBase64: String
    profileBackgroundFileName: String
    profileBackgroundMimeType: String
    profilePictureFileBase64: String
    profilePictureFileName: String
    profilePictureMimeType: String
  ): User
}
