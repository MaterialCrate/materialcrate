type User {
  id: ID!
  username: String!
  firstName: String
  surname: String
  profilePicture: String
  followers: [User!]!
  following: [User!]!
  followersCount: Int!
  followingCount: Int!
  email: String!
  linkedSEOs: [String!]!
  subscriptionPlan: String!
  subscriptionStartedAt: String
  subscriptionEndsAt: String
  emailVerified: Boolean!
  deleted: Boolean!
  deletedAt: String
  disabled: Boolean!
  disabledAt: String
  disabledUntil: String
  institution: String
  program: String
  createdAt: String
}

type AuthPayload {
  token: String!
  user: User!
}

type Query {
  me: User
  user(id: ID!): User
  usernameAvailable(username: String!): Boolean!
}

type Mutation {
  signup(
    email: String!
    password: String!
    username: String!
    firstName: String!
    surname: String!
    institution: String
    program: String
  ): AuthPayload
  login(email: String!, password: String!): AuthPayload
  socialAuth(
    provider: String!
    providerUserId: String!
    email: String!
    firstName: String
    surname: String
  ): AuthPayload
  verifyEmailCode(email: String!, code: String!): Boolean!
  resendVerificationEmail(email: String!): Boolean!
  deleteMyAccount: Boolean!
  disableMyAccount(until: String): Boolean!
  reactivateMyAccount: Boolean!
  completeProfile(
    username: String!
    firstName: String!
    surname: String!
    institution: String!
    program: String
    profilePicture: String
  ): User
}
