type User {
  id: ID!
  username: String!
  displayName: String!
  profilePicture: String
  profileBackground: String!
  followers: [User!]!
  following: [User!]!
  mutedUsers: [User!]!
  followersCount: Int!
  followingCount: Int!
  email: String!
  pendingEmail: String
  linkedSEOs: [String!]!
  uninterestedPostIds: [ID!]!
  blockedUserIds: [ID!]!
  subscriptionPlan: String!
  subscriptionStartedAt: String
  subscriptionEndsAt: String
  emailVerified: Boolean!
  deleted: Boolean!
  deletedAt: String
  disabled: Boolean!
  disabledAt: String
  disabledUntil: String
  institution: String
  program: String
  createdAt: String
}

type AuthPayload {
  token: String!
  user: User!
  verificationEmailSent: Boolean!
  verificationEmailError: String
}

type Query {
  me: User
  user(id: ID!): User
  userByUsername(username: String!): User
  searchUsers(query: String!, limit: Int = 12): [User!]!
  usernameAvailable(username: String!): Boolean!
  emailAvailable(email: String!): Boolean!
}

type Mutation {
  signup(
    email: String!
    password: String!
    username: String!
    displayName: String!
    institution: String
    program: String
  ): AuthPayload
  login(email: String!, password: String!): AuthPayload
  socialAuth(
    provider: String!
    providerUserId: String!
    email: String!
    displayName: String
  ): AuthPayload
  verifyEmailCode(email: String!, code: String!): Boolean!
  resendVerificationEmail(email: String!): Boolean!
  requestEmailChange(newEmail: String!): Boolean!
  verifyPendingEmailChange(code: String!): User!
  resendPendingEmailChange: Boolean!
  deleteMyAccount: Boolean!
  disableMyAccount(until: String): Boolean!
  reactivateMyAccount: Boolean!
  followUser(username: String!): Boolean!
  unfollowUser(username: String!): Boolean!
  muteUser(username: String!): Boolean!
  unmuteUser(username: String!): Boolean!
  blockUser(username: String!): Boolean!
  unblockUser(username: String!): Boolean!
  completeProfile(
    username: String!
    displayName: String!
    institution: String!
    program: String
    profilePicture: String
    profileBackground: String
    profileBackgroundFileBase64: String
    profileBackgroundFileName: String
    profileBackgroundMimeType: String
    profilePictureFileBase64: String
    profilePictureFileName: String
    profilePictureMimeType: String
  ): User
}
