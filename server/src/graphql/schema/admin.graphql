type AdminCashoutRequest {
  id: ID!
  userId: ID!
  tokensAmount: Int!
  cashAmount: Float!
  status: String!
  payoutMethod: String!
  payoutDetails: String!
  adminNote: String
  reviewedAt: String
  createdAt: String!
  user: AdminCashoutUser!
}

type AdminCashoutUser {
  id: ID!
  username: String!
  displayName: String!
  email: String!
  tokenBalance: Int!
  tokensEarned: Int!
}

extend type Mutation {
  adminReviewCashoutRequest(id: ID!, status: String!, adminNote: String): Boolean!

  adminCreateBot(
    username: String!
    displayName: String!
    institution: String
    program: String
    profilePicture: String
  ): User!

  adminCreatePostAsBot(
    botId: ID!
    fileBase64: String!
    thumbnailBase64: String
    fileName: String!
    mimeType: String!
    title: String!
    categories: [String!]!
    description: String
    year: Int
  ): Post!
}

extend type Query {
  adminListBots: [User!]!
  adminListCashoutRequests(status: String, limit: Int = 50, offset: Int = 0): [AdminCashoutRequest!]!
}
