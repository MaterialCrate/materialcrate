type Post {
  id: ID!
  fileUrl: String!
  thumbnailUrl: String
  title: String!
  courseCode: String!
  description: String
  year: Int
  author: User
  likeCount: Int!
  commentCount: Int!
  commentsDisabled: Boolean!
  comments(limit: Int = 20, offset: Int = 0): [Comment!]!
  viewerHasLiked: Boolean!
  pinned: Boolean!
  createdAt: String!
}

type PostVersion {
  id: ID!
  postId: ID!
  versionNumber: Int!
  title: String!
  courseCode: String!
  description: String
  year: Int
  fileUrl: String!
  thumbnailUrl: String
  editor: User
  createdAt: String!
}

type Comment {
  id: ID!
  post: Post!
  postId: ID!
  parentId: ID
  parent: Comment
  replies(limit: Int = 20, offset: Int = 0): [Comment!]!
  replyCount: Int!
  author: User!
  content: String!
  likeCount: Int!
  viewerHasLiked: Boolean!
  createdAt: String!
  updatedAt: String!
}

extend type Query {
  post(id: ID!): Post
  postVersions(postId: ID!): [PostVersion!]!
  posts(authorUsername: String): [Post!]!
  searchPosts(query: String!, limit: Int = 12): [Post!]!
  comments(
    postId: ID!
    parentCommentId: ID
    limit: Int = 50
    offset: Int = 0
  ): [Comment!]!
}

extend type Mutation {
  createPost(
    fileBase64: String!
    thumbnailBase64: String
    fileName: String!
    mimeType: String!
    title: String!
    courseCode: String!
    description: String
    year: Int
  ): Post!
  updatePost(
    postId: ID!
    title: String!
    courseCode: String!
    description: String
    year: Int
  ): Post!
  deletePost(postId: ID!): Boolean!
  togglePostLike(postId: ID!): Post!
  pinPostToProfile(postId: ID!): Post!
  togglePostComments(postId: ID!): Post!
  markPostNotInterested(postId: ID!): Boolean!
  createComment(postId: ID!, content: String!, parentCommentId: ID): Comment!
  toggleCommentLike(commentId: ID!): Comment!
}
